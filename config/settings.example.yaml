# ===========================================================================
# Concurso Radar — Plantilla de configuración
# ---------------------------------------------------------------------------
# COPIA este archivo como "settings.yaml" en esta misma carpeta y rellena
# los valores. El archivo real (settings.yaml) está excluido de Git porque
# contiene secretos; esta plantilla sí se versiona como referencia.
#
#   Windows (PowerShell):  Copy-Item config\settings.example.yaml config\settings.yaml
#   Linux / macOS:         cp config/settings.example.yaml config/settings.yaml
# ===========================================================================

# --- Credenciales (pegar los tokens reales en settings.yaml) ---------------
apify:
  token: ""              # API token de Apify (empieza con "apify_api_...")
  actor_id: ""           # ID del actor: apify/instagram-post-scraper → buscar en apify.com/apify/instagram-post-scraper

telegram:
  bot_token: ""          # Token del bot creado con @BotFather
  chat_id: ""            # chat_id destino (el tuyo para pruebas; el del cliente en producción)

# --- Fase 2: clasificación con IA (cuenta de Anthropic, aparte de Apify) --------
# La IA se ACTIVA sola en cuanto api_key tenga valor. Vacía = el sistema corre solo
# con keywords (Fase 1), sin tocar código. Esta cuenta es SEPARADA de Apify y no
# cuenta contra el tope de $5/mes.
anthropic:
  api_key: ""                          # pega aquí la key de la cuenta de Anthropic del cliente
  modelo: "claude-haiku-4-5-20251001"  # Claude Haiku: barato y suficiente para este volumen
  criterio_relevancia: >               # qué cuenta como "relevante" (se afina con el cliente)
    Es relevante un concurso o sorteo real donde el usuario debe participar, comprar
    o interactuar para ganar un premio concreto. NO es relevante: publicidad sin
    mecánica de participación, ofertas o descuentos, empleos, webinars o cursos, ni
    dinámicas de muy bajo valor.

# --- Cuentas de Instagram a monitorear -------------------------------------
# Esta lista cambia con el tiempo: agregar o quitar cuentas aquí.
cuentas:
  - antioquenobog
  - falabella_co
  - mallplazaco
  - smirnoffco
  - altoque_terpel
  - elcorraloficial
  - dominospizzacol
  - umusiccolombia
  - sonymusiccol
  - davivienda
  - homecenter_co
  - bancolombia

# --- Filtro por palabras clave (Fase 1) ------------------------------------
# Un post es candidato si su texto contiene ALGUNA palabra de `incluir`
# y NINGUNA de `excluir`. La comparación ignora mayúsculas y tildes.
keywords:
  incluir:
    - participa
    - gana
    - sorteo
    - concurso
    - dinamica
    - aplican t&c
    - terminos y condiciones
  excluir:
    - vacante
    - empleo
    - contratamos
    - webinar
    - curso

# --- Parámetros de búsqueda (controlan el costo en Apify) ------------------
busqueda:
  posts_por_cuenta: 5       # con el filtro de fecha activo, el costo lo controla la VENTANA,
                            # no este número, así que se sube para no perder posts en cuentas
                            # muy activas. OJO: si vacías el filtro de abajo, baja esto a 2-3.
  intervalo_minutos: 60     # OBSOLETO (era de APScheduler). El horario lo manda ahora el
                            # Programador de Tareas; las horas se configuran en install.py (HORAS).
  max_corridas_por_dia: 2   # TOPE DURO de búsquedas pagadas por día. Es la palanca de costo:
                            # aunque haya varios disparos (slots fijos + inicio de sesión), nunca
                            # se pagan más de esto. Cuenta solo corridas EXITOSAS (no fallidas/pausadas).
  min_horas_entre_corridas: 5   # SEPARACIÓN mínima entre corridas. Si un slot cae dentro de esta
                                # ventana se omite (estado 'omitido_reciente'); el slot de tarde extra
                                # (install.py:HORAS, ej. 20:00) lo repone una vez pasada la separación,
                                # garantizando la 2.ª corrida del día aun si el PC arrancó en la tarde.
                                # Debe ser MENOR que la separación entre HORAS (11:00-18:00 = 7h).
  solo_posts_mas_nuevos_que: "70 minutes"   # filtro de fecha (onlyPostsNewerThan). Trae solo posts
                                            # de la última hora aprox. (un poco más que el intervalo,
                                            # para no perder posts en el borde). Esto es lo que mantiene
                                            # el costo en ~$3-4/mes. Vacío = sin filtro (caro).
  saltar_posts_fijados: true                # skipPinnedPosts. IMPRESCINDIBLE: el actor, por defecto,
                                            # devuelve los posts FIJADOS de cada cuenta ignorando el
                                            # filtro de fecha, lo que dispara el costo. En true, los omite.

# --- Control de presupuesto ------------------------------------------------
presupuesto:
  limite_diario_usd: 0.25           # techo de gasto/día; si se supera, pausa y avisa
  costo_por_mil_resultados_usd: 1.70  # tarifa REAL medida de apify/instagram-post-scraper ($0.0017/evento).
                                      # Con 39 cuentas × 2 ciclos/día el costo estimado es ~$0.13/día.

# --- Heartbeat (mensaje de "sigo activo") ----------------------------------
heartbeat:
  activo: true
  hora: "20:00"             # informativo. En el modelo de corrida única el heartbeat se manda en la
                            # PRIMERA corrida del día (no a esta hora); el horario real lo fija install.py.

# --- Resumen diario (qué se hizo en el día) --------------------------------
# Se manda al final del día por una tarea programada propia (ConcursoRadarResumen),
# que corre `main.py --resumen` SIN consultar Apify (costo cero). Reporta cuántos
# posts nuevos se revisaron y cuántas alertas se enviaron.
resumen:
  activo: true
  hora: "21:00"             # informativo. El horario real lo fija install.py (HORA_RESUMEN).

# --- Base de datos y logs --------------------------------------------------
base_datos:
  ruta: "storage/monitor.db"

logs:
  ruta: "logs/system.log"
  retener_semanas: 4
